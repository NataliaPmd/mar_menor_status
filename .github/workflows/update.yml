name: Update Mar Menor data

on:
  schedule:
    - cron: "0 7 * * 1"   # Every Monday at 07:00 UTC
  workflow_dispatch:        # Also runnable manually from the Actions tab

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # Required to commit and push the updated CSVs

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        run: python scraper.py
        # If the scraper exits with a non-zero code the job fails
        # and the error is visible in the Actions log.

      - name: Commit and push updated CSVs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add datos/parametros.csv datos/aforos.csv
          # Only commit when there are actual changes to avoid empty commits
          git diff --cached --quiet || git commit -m "data: automated update $(date -u +%Y-%m-%d)"
          git push
